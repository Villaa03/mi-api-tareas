version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "--- Instalando dependencias ---"
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "--- Ejecutando pruebas ---"
      - python -m pytest tests/ -v

  build:
    commands:
      - echo "--- Build completado: $(date) ---"

artifacts:
  files:
    - "**/*"
  discard-paths: no
